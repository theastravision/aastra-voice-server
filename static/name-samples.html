<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Astra — Name &amp; Voice Samples</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0e17;
      --card: #121a2b;
      --accent: #6366f1;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --success: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, #1e2a4a 0%, var(--bg) 55%);
      color: var(--text);
      padding: 1rem;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .top h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
    }
    .top a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      overflow: hidden;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tab {
      flex: 1;
      padding: 0.85rem 1rem;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      color: var(--text);
      background: rgba(99,102,241,0.12);
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .toolbar {
      padding: 1rem 1rem 0.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar input {
      flex: 1;
      min-width: 180px;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.25);
      color: var(--text);
    }
    .stats {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .list {
      max-height: min(70vh, 640px);
      overflow-y: auto;
      padding: 0.5rem 1rem 1rem;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .row:last-child { border-bottom: none; }
    .row-info { flex: 1; min-width: 0; }
    .row-title {
      font-weight: 600;
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .row-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.45rem;
      border-radius: 6px;
    }
    .badge.ok { background: rgba(52,211,153,0.15); color: var(--success); }
    .badge.missing { background: rgba(251,191,36,0.12); color: var(--warn); }
    .btn-play {
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      flex-shrink: 0;
    }
    .btn-play:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .hint {
      padding: 0 1rem 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .hint code {
      font-size: 0.76rem;
      background: rgba(0,0,0,0.25);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem;
    }
    .loading { text-align: center; color: var(--muted); padding: 2rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Name &amp; voice samples</h1>
      <a href="/bot">← Back to interview bot</a>
      <a href="/bot/tts">TTS lab</a>
    </div>

    <div class="card">
      <div class="tabs">
        <button type="button" class="tab active" data-tab="names">Interview names</button>
        <button type="button" class="tab" data-tab="voices">Edge TTS voices</button>
      </div>

      <div class="toolbar">
        <input id="search" type="search" placeholder="Search…" autocomplete="off" />
        <span id="stats" class="stats"></span>
      </div>

      <div id="list" class="list">
        <p class="loading">Loading…</p>
      </div>

      <p id="hint" class="hint"></p>
    </div>
  </div>

  <audio id="player" playsinline></audio>

  <script>
    const API = window.location.origin;
    const listEl = document.getElementById('list');
    const searchEl = document.getElementById('search');
    const statsEl = document.getElementById('stats');
    const hintEl = document.getElementById('hint');
    const player = document.getElementById('player');
    const tabs = document.querySelectorAll('.tab');

    let activeTab = 'names';
    let namesData = [];
    let voicesData = [];
    let playingUrl = null;

    const HINTS = {
      names: 'Pregenerated mp3 files live in <code>data/name-samples/</code>. Generate with <code>bash scripts/generate-interview-name-samples.sh</code> (Edge TTS, one name at a time).',
      voices: 'Pregenerated mp3 files live in <code>data/voice-samples/</code>. Generate with <code>bash scripts/generate-edge-voice-samples.sh</code> (all Microsoft neural voices, one by one).',
    };

    async function api(path) {
      const res = await fetch(API + path, { headers: { 'ngrok-skip-browser-warning': '1' } });
      const text = await res.text();
      if (!res.ok) throw new Error(text || ('HTTP ' + res.status));
      return JSON.parse(text);
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function filteredItems() {
      const q = (searchEl.value || '').trim().toLowerCase();
      if (activeTab === 'names') {
        return namesData.filter((item) => !q || item.name.toLowerCase().includes(q));
      }
      return voicesData.filter((item) => {
        if (!q) return true;
        const hay = [item.short_name, item.display_name, item.locale, item.gender].join(' ').toLowerCase();
        return hay.includes(q);
      });
    }

    function render() {
      hintEl.innerHTML = HINTS[activeTab];
      const items = filteredItems();
      const total = activeTab === 'names' ? namesData.length : voicesData.length;
      const withAudio = items.filter((i) => i.has_audio).length;
      statsEl.textContent = items.length + ' shown · ' + withAudio + ' with audio · ' + total + ' total';

      if (!items.length) {
        listEl.innerHTML = '<p class="empty">No matches.</p>';
        return;
      }

      listEl.innerHTML = items.map((item) => {
        if (activeTab === 'names') {
          return rowHtml({
            title: item.name,
            meta: item.slug + '.mp3',
            hasAudio: item.has_audio,
            audioUrl: item.audio_url,
          });
        }
        return rowHtml({
          title: item.short_name,
          meta: [item.locale, item.gender].filter(Boolean).join(' · ') || item.display_name,
          hasAudio: item.has_audio,
          audioUrl: item.audio_url,
        });
      }).join('');

      listEl.querySelectorAll('.btn-play').forEach((btn) => {
        btn.addEventListener('click', () => playUrl(btn.dataset.url));
      });
    }

    function rowHtml({ title, meta, hasAudio, audioUrl }) {
      return (
        '<div class="row">' +
          '<div class="row-info">' +
            '<div class="row-title">' + escapeHtml(title) + '</div>' +
            '<div class="row-meta">' + escapeHtml(meta) + '</div>' +
          '</div>' +
          '<span class="badge ' + (hasAudio ? 'ok' : 'missing') + '">' + (hasAudio ? 'ready' : 'missing') + '</span>' +
          '<button type="button" class="btn-play" data-url="' + escapeHtml(audioUrl || '') + '" ' + (hasAudio ? '' : 'disabled') + '>Play</button>' +
        '</div>'
      );
    }

    async function playUrl(url) {
      if (!url) return;
      if (playingUrl === url && !player.paused) {
        player.pause();
        playingUrl = null;
        return;
      }
      playingUrl = url;
      player.src = url;
      try {
        await player.play();
      } catch (e) {
        console.warn(e);
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        tabs.forEach((t) => t.classList.toggle('active', t === tab));
        searchEl.value = '';
        searchEl.placeholder = activeTab === 'names' ? 'Search names…' : 'Search voices (locale, gender, short name)…';
        render();
      });
    });

    searchEl.addEventListener('input', render);

    async function init() {
      try {
        const [namesRes, voicesRes] = await Promise.all([
          api('/api/v1/demo/interview-names'),
          api('/api/v1/demo/edge-voices'),
        ]);
        namesData = namesRes.names || [];
        voicesData = voicesRes.voices || [];
        render();
      } catch (e) {
        listEl.innerHTML = '<p class="empty">Failed to load: ' + escapeHtml(e.message) + '</p>';
      }
    }

    init();
  </script>
</body>
</html>
